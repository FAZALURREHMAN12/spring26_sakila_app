version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: sakila
    volumes:
      - sakila-db-data:/var/lib/mysql
    networks:
      - sakila-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      MYSQL_HOST: db
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - sakila-network
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure:5

  db-admin:
    image: adminer:latest
    ports:
      - "8080:8080"
    networks:
      - sakila-network
    depends_on:
      - db

  test-runner:
    build: .
    profiles: ["test"]
    command: python -m pytest tests/ -v
    environment:
      MYSQL_HOST: db
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - sakila-network
    depends_on:
      db:
        condition: service_healthy

networks:
  sakila-network:

volumes:
  sakila-db-data: