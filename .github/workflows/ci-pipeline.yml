name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.9'
  IMAGE_NAME: sakila-app

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 . --max-line-length=120 --ignore=E501,W503,E128,E302,W291,W292,W293,F401
  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: admin
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -padmin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Load Sakila Database
        run: |
          wget https://downloads.mysql.com/docs/sakila-db.tar.gz
          tar -xvf sakila-db.tar.gz
          mysql -h 127.0.0.1 -P 3306 -uroot -padmin < sakila-db/sakila-schema.sql
          mysql -h 127.0.0.1 -P 3306 -uroot -padmin < sakila-db/sakila-data.sql
      - name: Run Pytest
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PASSWORD: admin
          PYTHONPATH: .
        run: pytest tests/ -v
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Verify image creation
        run: docker images
      - name: Smoke Test
        run: |
          docker run -d -p 5000:5000 --name test-app ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 5
          curl -f http://localhost:5000/ || exit 1

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scanning
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          output: 'trivy-results.txt'
      - name: Upload Trivy scan results to artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: trivy-results.txt